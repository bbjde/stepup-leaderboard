<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tribe Steps Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Joseph's Tribe Steps Leaderboard</h1>
    <p class="sub">Weekly updates • Select one or more names to compare progress</p>

    <div class="card">
      <label for="personSelect">Select participant(s) (hold Ctrl/Cmd to select multiple)</label>
      <select id="personSelect" multiple size="5"></select>
      <button id="updateBtn">Update Charts</button>

      <div class="stats" id="stats"></div>
    </div>
    
    <div class="card">
      <h2>Wrap-up replay</h2>
      <div class="controls">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <label>Speed
          <select id="speedSelect">
            <option value="900">Slow</option>
            <option value="500" selected>Normal</option>
            <option value="250">Fast</option>
          </select>
        </label>
      </div>
      <div id="replayText" class="replayText"></div>
    </div>
    
    <div class="card">
      <h2>Daily steps</h2>
      <canvas id="dailyChart"></canvas>
    </div>

    <div class="card">
      <h2>Cumulative steps</h2>
      <canvas id="cumChart"></canvas>
    </div>

    <div class="card">
      <h2>Leaderboard (Total steps)</h2>
      <table id="leaderboard">
        <thead>
          <tr><th>Rank</th><th>Name</th><th>Total Steps</th><th>Avg Daily</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>


    <p class="footer">Data source: weekly StepUp group export</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
